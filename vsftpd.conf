background=NO
listen=YES
listen_ipv6=NO

anonymous_enable=NO
local_enable=YES
write_enable=YES

chroot_local_user=YES
allow_writeable_chroot=YES

local_umask=022

seccomp_sandbox=NO

xferlog_enable=YES
vsftpd_log_file=/honeypot-logs/vsftpd.log
log_ftp_protocol=YES

pasv_enable=YES
pasv_min_port=21000
pasv_max_port=21010
